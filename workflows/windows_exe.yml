name: Generar EXE para Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Se instala si el archivo existe para evitar errores
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Crear Ejecutable
      run: |
        # --noconfirm sobrescribe la carpeta dist si ya existe
        # --clean limpia el cache antes de buildear
        pyinstaller --onefile --windowed --clean --noconfirm --collect-all PIL --collect-all reportlab --collect-all matplotlib app.py

    - name: Guardar el archivo generado
      uses: actions/upload-artifact@v4
      with:
        name: ejecutable-windows
        path: dist/app.exe  # Es mejor apuntar al archivo específico
        if-no-files-found: error # Te avisa si el build falló y no generó nada